<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>카드 정산 도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F3EE;--surface:#fff;--surface2:#F0EDE6;--border:#DDD9CF;
  --ink:#1A1814;--ink2:#6B6760;--ink3:#A09C96;
  --accent:#2D5BE3;--accent-light:#EEF2FC;
  --green:#1A7A4A;--green-light:#E8F5EE;
  --red:#C0392B;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:14px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6;}
.top-bar{background:var(--ink);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;}
.top-inner{max-width:660px;margin:0 auto;display:flex;align-items:center;gap:12px;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#4A80F0,#2D5BE3);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.logo-text{font-size:15px;font-weight:700;}
.logo-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px;}
.wrap{max-width:660px;margin:0 auto;padding:20px 16px 60px;}
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-title{font-size:12px;font-weight:700;color:var(--ink2);letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.card-title::before{content:'';display:block;width:3px;height:13px;background:var(--accent);border-radius:2px;}

/* 업로드 */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:32px 16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;background:var(--surface);}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-light);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:36px;margin-bottom:10px;}
.upload-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.upload-sub{font-size:12px;color:var(--ink3);}
.preview-img{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-top:12px;display:none;}
.preview-img.show{display:block;}

/* 버튼 */
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#2450CC;transform:translateY(-1px);}
.btn-primary:disabled{background:#A8B9F0;cursor:not-allowed;transform:none;}
.btn-secondary{background:var(--surface2);color:var(--ink);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-green{background:linear-gradient(135deg,#1A7A4A,#15803d);color:#fff;}
.btn-green:hover{filter:brightness(1.1);}

/* 진행 바 */
.progress-wrap{margin-top:14px;display:none;}
.progress-wrap.show{display:block;}
.progress-label{font-size:12px;color:var(--ink3);margin-bottom:6px;text-align:center;}
.progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .3s;}

/* OCR 결과 편집 */
.ocr-result{margin-top:14px;display:none;}
.ocr-result.show{display:block;}
.ocr-title{font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.ocr-row{display:grid;grid-template-columns:1fr 120px 24px;gap:8px;margin-bottom:6px;align-items:center;}
.ocr-row input{padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--ink);font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;}
.ocr-row input:focus{border-color:var(--accent);}
.ocr-del{width:24px;height:24px;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;color:var(--ink3);display:flex;align-items:center;justify-content:center;}
.ocr-del:hover{border-color:var(--red);color:var(--red);}
.add-btn{width:100%;padding:8px;background:none;border:1px dashed var(--border);border-radius:8px;color:var(--ink3);font-size:13px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:4px;}
.add-btn:hover{border-color:var(--accent);color:var(--accent);}

/* 은행 계좌 */
.bank-section{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px;}
.bank-toggle-row{display:flex;align-items:center;justify-content:space-between;}
.bank-toggle-label{font-size:12px;font-weight:700;color:var(--ink2);}
.toggle-btn{background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.bank-grid{display:none;margin-top:10px;}
.bank-row{display:grid;grid-template-columns:90px 1fr;gap:8px;align-items:center;margin-bottom:6px;}
.bank-name{font-size:12px;font-weight:600;color:var(--ink2);}
.bank-input{padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--ink);font-family:'DM Mono',monospace;outline:none;width:100%;}
.bank-input:focus{border-color:var(--accent);}

/* 결과 */
#resultWrap{display:none;}
#resultWrap.show{display:block;}
.total-hero{background:linear-gradient(135deg,#1A1814,#2D3748);border-radius:12px;padding:20px;margin-bottom:14px;color:#fff;}
.total-label{font-size:11px;color:rgba(255,255,255,.5);margin-bottom:4px;}
.total-amount{font-size:30px;font-weight:900;letter-spacing:-.03em;font-family:'DM Mono',monospace;}
.total-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:5px;}
.sum-block{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.sum-head{background:var(--ink);color:#fff;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;}
.sum-head-bank{font-size:13px;font-weight:700;}
.sum-head-date{font-size:11px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.1);border-radius:4px;padding:2px 8px;}
.sum-card-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.sum-card-name{color:var(--ink2);}
.sum-card-amt{font-family:'DM Mono',monospace;font-weight:500;}
.sum-total{background:var(--green-light);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.sum-total-label{font-size:11px;font-weight:700;color:var(--green);}
.sum-account{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;margin-top:2px;}
.sum-total-amt{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:var(--green);}

/* 출력 */
.out-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.out-tab{padding:11px 6px;border:1px solid var(--border);border-radius:10px;background:var(--surface);text-align:center;cursor:pointer;transition:all .15s;}
.out-tab.sel{border-color:var(--accent);background:var(--accent-light);}
.out-tab-icon{font-size:20px;margin-bottom:3px;}
.out-tab-label{font-size:12px;font-weight:600;color:var(--ink2);}
.out-tab.sel .out-tab-label{color:var(--accent);}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:22px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:500;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
canvas{display:none;}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-inner">
    <div class="logo-icon">💳</div>
    <div>
      <div class="logo-text">카드 정산 도우미</div>
      <div class="logo-sub">캡처 이미지 업로드 → 자동 인식 → 정산표 출력</div>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- STEP 1: 이미지 업로드 -->
  <div class="card">
    <div class="card-title">STEP 1 — 캡처 이미지 업로드</div>

    <div class="upload-zone" id="uploadZone"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleDrop(event)">
      <input type="file" accept="image/*" onchange="handleFile(this.files[0])">
      <div id="uploadContent">
        <div class="upload-icon">📱</div>
        <div class="upload-title">카드 결제 화면 캡처를 올려주세요</div>
        <div class="upload-sub">토스 · 네이버페이 · 카카오페이 · 은행앱<br>클릭하거나 드래그 · 모바일은 갤러리에서 선택</div>
      </div>
      <img class="preview-img" id="previewImg">
    </div>

    <!-- 진행 바 -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label" id="progressLabel">이미지 분석 중...</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <!-- OCR 결과 확인/수정 -->
    <div class="ocr-result" id="ocrResult">
      <div class="ocr-title">
        <span>📋 인식된 카드 내역 — 확인 후 수정하세요</span>
        <button class="toggle-btn" onclick="addOcrRow()">+ 추가</button>
      </div>
      <div id="ocrList"></div>
      <button class="add-btn" onclick="addOcrRow()">+ 카드 추가</button>
      <button class="btn btn-primary" id="btnConfirm" onclick="confirmCards()">✅ 확인 — 정산표 만들기</button>
    </div>

    <button class="btn btn-primary" id="btnScan" onclick="startScan()" disabled>
      🔍 자동 인식 시작
    </button>
  </div>

  <!-- 은행 계좌 설정 -->
  <div class="card">
    <div class="card-title">납부 은행 계좌 설정</div>
    <p style="font-size:12px;color:var(--ink3);margin-bottom:12px;">한 번만 입력하면 저장됩니다. 언제든 수정 가능.</p>
    <div id="bankGrid"></div>
    <button class="btn btn-secondary" onclick="saveBanks()" style="margin-top:8px;padding:10px;font-size:13px;">💾 저장</button>
  </div>

  <!-- STEP 2: 결과 -->
  <div id="resultWrap">
    <div class="card">
      <div class="card-title">STEP 2 — 은행별 납부 집계</div>
      <div class="total-hero">
        <div class="total-label">이번 달 전체 결제 예정액</div>
        <div class="total-amount" id="grandTotal">0원</div>
        <div class="total-sub" id="cardCount"></div>
      </div>
      <div id="sumBlocks"></div>
    </div>

    <div class="card">
      <div class="card-title">STEP 3 — 출력 형식 선택</div>
      <div class="out-tabs">
        <div class="out-tab sel" id="outExcel" onclick="selOut('excel')"><div class="out-tab-icon">📊</div><div class="out-tab-label">엑셀</div></div>
        <div class="out-tab" id="outText" onclick="selOut('text')"><div class="out-tab-icon">📝</div><div class="out-tab-label">텍스트</div></div>
        <div class="out-tab" id="outImage" onclick="selOut('image')"><div class="out-tab-icon">🖼️</div><div class="out-tab-label">이미지</div></div>
      </div>
      <button class="btn btn-green" onclick="doDownload()">⬇️ <span id="dlLabel">엑셀 다운로드</span></button>
    </div>
  </div>

</div>

<canvas id="cvs"></canvas>
<div class="toast" id="toast"></div>

<!-- Tesseract.js OCR (브라우저 내장, 서버 불필요) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>

// ══════════════════════════════
//  카드사 DB
// ══════════════════════════════
const CARD_DB = [
  {name:'하나카드',   keys:['하나카드','당근카드'],             day:23, bank:'하나은행'},
  {name:'신한카드',   keys:['신한카드','신한'],                  day:25, bank:'토스뱅크'},
  {name:'KB국민카드', keys:['KB국민','국민카드','kb국민'],        day:25, bank:'우리은행'},
  {name:'삼성카드',   keys:['삼성카드','삼성'],                  day:25, bank:'우리은행'},
  {name:'현대카드',   keys:['현대카드','현대'],                  day:25, bank:'우리은행'},
  {name:'롯데카드',   keys:['롯데카드','롯데'],                  day:25, bank:'우리은행'},
  {name:'우리카드',   keys:['우리카드'],                         day:25, bank:'우리은행'},
  {name:'NH농협카드', keys:['농협카드','NH농협','nh농협','농협'], day:25, bank:'농협은행'},
];
const BANK_ORDER = ['우리은행','하나은행','토스뱅크','농협은행'];
const ALL_BANKS  = ['우리은행','하나은행','신한은행','국민은행','토스뱅크','농협은행','카카오뱅크','기업은행','케이뱅크'];

let currentFile = null;
let currentCards = [];
let selectedOut  = 'excel';

// ══════════════════════════════
//  초기화
// ══════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  renderBankGrid();
});

// ══════════════════════════════
//  이미지 업로드
// ══════════════════════════════
function handleDrop(e){
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if(f && f.type.startsWith('image/')) handleFile(f);
}

function handleFile(f){
  if(!f) return;
  currentFile = f;
  const r = new FileReader();
  r.onload = ev => {
    const img = document.getElementById('previewImg');
    img.src = ev.target.result;
    img.className = 'preview-img show';
    document.getElementById('uploadContent').style.display = 'none';
    document.getElementById('btnScan').disabled = false;
    // OCR 결과 초기화
    document.getElementById('ocrResult').className = 'ocr-result';
    document.getElementById('resultWrap').className = '';
  };
  r.readAsDataURL(f);
}

// ══════════════════════════════
//  OCR 실행
// ══════════════════════════════
async function startScan(){
  document.getElementById('btnScan').disabled = true;
  document.getElementById('progressWrap').className = 'progress-wrap show';
  document.getElementById('progressLabel').textContent = '이미지 분석 중... (첫 실행은 30초 정도 걸릴 수 있어요)';
  setProgress(5);

  try {
    const result = await Tesseract.recognize(currentFile, 'kor+eng', {
      logger: m => {
        if(m.status === 'recognizing text'){
          setProgress(10 + Math.round(m.progress * 85));
        }
      }
    });

    setProgress(100);
    document.getElementById('progressLabel').textContent = '인식 완료! 아래에서 확인해 주세요.';

    const text = result.data.text;
    const parsed = parseOcrText(text);
    renderOcrResult(parsed);

  } catch(e){
    document.getElementById('progressLabel').textContent = '인식 실패: ' + e.message;
    toast('❌ 이미지 인식에 실패했습니다. 직접 입력해 주세요.');
    // 빈 폼 표시
    renderOcrResult([]);
  }
}

function setProgress(pct){
  document.getElementById('progressFill').style.width = pct + '%';
}

// ══════════════════════════════
//  OCR 텍스트 파싱
// ══════════════════════════════
function parseOcrText(text){
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const results = [];

  // 카드사 이름과 금액 패턴 매칭
  // 숫자 패턴: 1,234,567원 또는 1234567
  const amountPattern = /([0-9,]+)원?/g;

  for(let i = 0; i < lines.length; i++){
    const line = lines[i];
    const cardInfo = matchCardName(line);
    if(!cardInfo) continue;

    // 같은 줄 또는 다음 줄에서 금액 찾기
    let amount = 0;
    const combinedText = line + ' ' + (lines[i+1] || '');
    const matches = [...combinedText.matchAll(/([0-9]{1,3}(?:,[0-9]{3})*)/g)];

    // 가장 큰 숫자를 금액으로 (카드 결제금액은 보통 큰 숫자)
    for(const m of matches){
      const num = parseInt(m[1].replace(/,/g,''), 10);
      if(num > amount && num > 1000 && num < 100000000) amount = num;
    }

    if(amount > 0){
      results.push({ cardName: cardInfo.name, amount, bank: cardInfo.bank, day: cardInfo.day });
    }
  }

  return results;
}

function matchCardName(text){
  const t = text.replace(/\s/g,'').toLowerCase();
  for(const c of CARD_DB){
    if(c.keys.some(k => t.includes(k.replace(/\s/g,'').toLowerCase()))) return c;
  }
  return null;
}

// ══════════════════════════════
//  OCR 결과 렌더 (수정 가능)
// ══════════════════════════════
function renderOcrResult(cards){
  const list = document.getElementById('ocrList');

  if(cards.length === 0){
    list.innerHTML = `<p style="font-size:13px;color:var(--ink3);margin-bottom:10px;">
      자동 인식이 어렵습니다. 아래에 직접 입력해 주세요.</p>`;
  } else {
    list.innerHTML = '';
    cards.forEach(c => addOcrRow(c));
  }

  document.getElementById('ocrResult').className = 'ocr-result show';
  document.getElementById('btnScan').style.display = 'none';
}

function addOcrRow(preset={}){
  const list = document.getElementById('ocrList');
  const div = document.createElement('div');
  div.className = 'ocr-row';
  div.innerHTML = `
    <input type="text" placeholder="카드사명" value="${preset.cardName||''}" data-t="name">
    <input type="text" placeholder="금액" inputmode="numeric"
      value="${preset.amount ? preset.amount.toLocaleString() : ''}" data-t="amount">
    <button class="ocr-del" onclick="this.parentElement.remove()">×</button>
  `;
  list.appendChild(div);
}

// ══════════════════════════════
//  정산표 생성
// ══════════════════════════════
function confirmCards(){
  const rows = document.querySelectorAll('#ocrList .ocr-row');
  const cards = [];
  rows.forEach(r => {
    const name   = r.querySelector('[data-t="name"]').value.trim();
    const amtStr = r.querySelector('[data-t="amount"]').value.replace(/[^0-9]/g,'');
    const amt    = parseInt(amtStr, 10);
    if(name && !isNaN(amt) && amt > 0){
      const info = matchCardName(name);
      cards.push({
        name:  info ? info.name : name,
        amount: amt,
        bank:  info ? info.bank : '미확인',
        day:   info ? info.day  : 25,
        acct:  getAcct(info ? info.bank : '미확인')
      });
    }
  });

  if(!cards.length){ toast('⚠️ 카드사와 금액을 입력해 주세요'); return; }
  currentCards = cards;
  buildResult();
}

// ══════════════════════════════
//  은행 계좌
// ══════════════════════════════
function renderBankGrid(){
  const saved = JSON.parse(localStorage.getItem('bank_accts')||'{}');
  document.getElementById('bankGrid').innerHTML = ALL_BANKS.map(b => `
    <div class="bank-row">
      <div class="bank-name">${b}</div>
      <input class="bank-input" data-bank="${b}" placeholder="계좌번호" value="${saved[b]||''}">
    </div>`).join('');
}

function saveBanks(){
  const data = {};
  document.querySelectorAll('.bank-input').forEach(i => {
    if(i.value.trim()) data[i.dataset.bank] = i.value.trim();
  });
  localStorage.setItem('bank_accts', JSON.stringify(data));
  toast('✅ 계좌번호 저장 완료');
}

function getAcct(bank){
  return (JSON.parse(localStorage.getItem('bank_accts')||'{}')||{})[bank] || '-';
}

// ══════════════════════════════
//  집계 렌더
// ══════════════════════════════
function buildResult(){
  // 은행 × 날짜 그룹화
  const map = {};
  for(const c of currentCards){
    const k = `${c.bank}__${c.day}`;
    if(!map[k]) map[k] = {bank:c.bank, day:c.day, acct:getAcct(c.bank), cards:[]};
    map[k].cards.push(c);
  }

  const keys = Object.keys(map).sort((a,b) => {
    const ga=map[a], gb=map[b];
    const oi = BANK_ORDER.indexOf(ga.bank) < 0 ? 99 : BANK_ORDER.indexOf(ga.bank);
    const oj = BANK_ORDER.indexOf(gb.bank) < 0 ? 99 : BANK_ORDER.indexOf(gb.bank);
    return oi !== oj ? oi - oj : ga.day - gb.day;
  });

  const grand = currentCards.reduce((s,c) => s+c.amount, 0);
  const now = new Date();

  document.getElementById('grandTotal').textContent = grand.toLocaleString() + '원';
  document.getElementById('cardCount').textContent =
    `${now.getFullYear()}년 ${now.getMonth()+1}월 · 카드 ${currentCards.length}개`;

  document.getElementById('sumBlocks').innerHTML = keys.map(k => {
    const g = map[k];
    const tot = g.cards.reduce((s,c) => s+c.amount, 0);
    return `
      <div class="sum-block">
        <div class="sum-head">
          <span class="sum-head-bank">🏦 ${g.bank}</span>
          <span class="sum-head-date">매월 ${g.day}일 납부</span>
        </div>
        ${g.cards.map(c => `
          <div class="sum-card-row">
            <span class="sum-card-name">${c.name}</span>
            <span class="sum-card-amt">${c.amount.toLocaleString()}원</span>
          </div>`).join('')}
        <div class="sum-total">
          <div>
            <div class="sum-total-label">💰 이체 합계</div>
            <div class="sum-account">${g.acct}</div>
          </div>
          <span class="sum-total-amt">${tot.toLocaleString()}원</span>
        </div>
      </div>`;
  }).join('');

  document.getElementById('resultWrap').className = 'show';
  setTimeout(() => document.getElementById('resultWrap').scrollIntoView({behavior:'smooth', block:'start'}), 100);
}

// ══════════════════════════════
//  출력
// ══════════════════════════════
function selOut(t){
  selectedOut = t;
  ['excel','text','image'].forEach(x =>
    document.getElementById('out' + x.charAt(0).toUpperCase() + x.slice(1)).classList.toggle('sel', x===t));
  document.getElementById('dlLabel').textContent =
    {excel:'엑셀 다운로드', text:'텍스트 복사', image:'이미지 저장'}[t];
}

function doDownload(){
  if(!currentCards.length){ toast('⚠️ 먼저 정산표를 만들어 주세요'); return; }
  if(selectedOut==='excel') dlExcel();
  else if(selectedOut==='text') dlText();
  else dlImage();
}

function getGroups(){
  const map = {};
  for(const c of currentCards){
    const k = `${c.bank}__${c.day}`;
    if(!map[k]) map[k] = {bank:c.bank, day:c.day, acct:getAcct(c.bank), cards:[]};
    map[k].cards.push(c);
  }
  return Object.values(map).sort((a,b) => {
    const oi = BANK_ORDER.indexOf(a.bank) < 0 ? 99 : BANK_ORDER.indexOf(a.bank);
    const oj = BANK_ORDER.indexOf(b.bank) < 0 ? 99 : BANK_ORDER.indexOf(b.bank);
    return oi !== oj ? oi - oj : a.day - b.day;
  });
}

function dlExcel(){
  const now = new Date(), groups = getGroups();
  const rows = [['카드사','납부일','결제금액','납부은행','계좌번호']];
  let grand = 0;
  for(const g of groups){
    const tot = g.cards.reduce((s,c) => s+c.amount, 0); grand += tot;
    g.cards.forEach(c => rows.push([c.name, `매월 ${g.day}일`, c.amount, g.bank, g.acct]));
    rows.push([`[${g.bank} ${g.day}일 합계]`, '', tot, g.bank, g.acct], []);
  }
  rows.push(['전체 합계', '', grand, '', '']);
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:12},{wch:14},{wch:12},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `${now.getMonth()+1}월 카드정산`);
  XLSX.writeFile(wb, `카드_결제내역_${now.getFullYear()}년${now.getMonth()+1}월.xlsx`);
  toast('✅ 엑셀 다운로드 완료');
}

function dlText(){
  const now = new Date(), groups = getGroups(); let grand = 0;
  const lines = [`💳 카드 정산 — ${now.getFullYear()}년 ${now.getMonth()+1}월`, '─'.repeat(34), ''];
  for(const g of groups){
    const tot = g.cards.reduce((s,c) => s+c.amount, 0); grand += tot;
    lines.push(`🏦 ${g.bank} · 매월 ${g.day}일 납부`, `   계좌: ${g.acct}`);
    g.cards.forEach(c => lines.push(`   ${c.name.padEnd(12)} ${c.amount.toLocaleString()}원`));
    lines.push(`   → 합계: ${tot.toLocaleString()}원`, '');
  }
  lines.push('─'.repeat(34), `💰 전체 합계: ${grand.toLocaleString()}원`);
  const txt = lines.join('\n');
  if(navigator.clipboard) navigator.clipboard.writeText(txt).then(() => toast('✅ 클립보드에 복사됐어요'));
  else { const ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); toast('✅ 텍스트 복사 완료'); }
}

function dlImage(){
  const now = new Date(), groups = getGroups(), W = 600, PAD = 24;
  let grand = 0, y = 90;
  const items = [];
  for(const g of groups){
    const tot = g.cards.reduce((s,c) => s+c.amount, 0); grand += tot;
    items.push({t:'bank', bank:g.bank, day:g.day});
    g.cards.forEach(c => items.push({t:'card', name:c.name, amount:c.amount}));
    items.push({t:'total', acct:g.acct, tot});
  }
  const H = 90 + items.length * 36 + 40;
  const cvs = document.getElementById('cvs'); cvs.width = W; cvs.height = H;
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = '#F5F3EE'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#1A1814'; ctx.fillRect(0,0,W,80);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 17px sans-serif'; ctx.fillText('💳 카드 정산 도우미', PAD, 28);
  ctx.font = 'bold 24px monospace'; ctx.fillText(grand.toLocaleString()+'원', PAD, 58);
  ctx.font = '11px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,.45)';
  ctx.fillText(`${now.getFullYear()}년 ${now.getMonth()+1}월`, PAD, 74);
  for(const l of items){
    if(l.t === 'bank'){
      ctx.fillStyle = '#E8E5DE'; ctx.fillRect(PAD-4, y, W-PAD*2+8, 30);
      ctx.fillStyle = '#1A1814'; ctx.font = 'bold 13px sans-serif';
      ctx.fillText(`🏦 ${l.bank} · 매월 ${l.day}일`, PAD+4, y+20); y += 34;
    } else if(l.t === 'card'){
      ctx.fillStyle = '#6B6760'; ctx.font = '13px sans-serif'; ctx.fillText(l.name, PAD+10, y+18);
      const aw = ctx.measureText(l.amount.toLocaleString()+'원').width;
      ctx.fillStyle = '#1A1814'; ctx.font = '13px monospace'; ctx.fillText(l.amount.toLocaleString()+'원', W-PAD-aw, y+18);
      ctx.strokeStyle = '#DDD9CF'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(PAD, y+30); ctx.lineTo(W-PAD, y+30); ctx.stroke();
      y += 34;
    } else {
      ctx.fillStyle = '#E8F5EE'; ctx.fillRect(PAD-4, y, W-PAD*2+8, 36);
      ctx.fillStyle = '#1A7A4A'; ctx.font = 'bold 13px sans-serif';
      ctx.fillText('합계', PAD+4, y+14);
      ctx.font = '11px monospace'; ctx.fillStyle = '#A09C96'; ctx.fillText(l.acct, PAD+4, y+28);
      const tw = ctx.measureText(l.tot.toLocaleString()+'원').width;
      ctx.fillStyle = '#1A7A4A'; ctx.font = 'bold 14px monospace'; ctx.fillText(l.tot.toLocaleString()+'원', W-PAD-tw, y+22);
      y += 40;
    }
  }
  const a = document.createElement('a');
  a.download = `카드정산_${now.getFullYear()}년${now.getMonth()+1}월.png`;
  a.href = cvs.toDataURL('image/png'); a.click();
  toast('✅ 이미지 저장 완료');
}

let _tt;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show'; clearTimeout(_tt); _tt=setTimeout(()=>el.className='toast',2500); }
</script>
